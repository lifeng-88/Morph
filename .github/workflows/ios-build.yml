name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: Morph

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        run: |
          if [[ ! -d /Applications/Xcode_26.5.app ]]; then
            echo "::error::未找到 Xcode 26.5，App Store 要求 iOS 26 SDK"
            ls /Applications | grep Xcode || true
            exit 1
          fi
          sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Morph.xcodeproj \
            -scheme Morph

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project Morph.xcodeproj \
            -scheme Morph \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -quiet
