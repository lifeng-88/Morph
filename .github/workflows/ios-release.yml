name: iOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      marketing_version:
        description: Marketing Version (e.g. 1.0.1)
        required: false
        type: string
      build_number:
        description: Build Number (leave empty to auto-increment)
        required: false
        type: string
      upload_to_app_store:
        description: Upload to App Store Connect
        required: true
        type: boolean
        default: true

env:
  BUNDLE_ID: com.morph.net
  SCHEME: Morph
  PROJECT: Morph.xcodeproj

defaults:
  run:
    working-directory: Morph

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        run: |
          if [[ ! -d /Applications/Xcode_26.5.app ]]; then
            echo "::error::未找到 Xcode 26.5，App Store 要求 iOS 26 SDK"
            ls /Applications | grep Xcode || true
            exit 1
          fi
          sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos

      - name: Resolve Marketing Version
        id: version
        working-directory: .
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.marketing_version }}" ]]; then
            VERSION="${{ inputs.marketing_version }}"
          else
            VERSION=$(grep -m1 'MARKETING_VERSION = ' Morph/Morph.xcodeproj/project.pbxproj | sed 's/.*= \(.*\);/\1/')
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "::error::Invalid Marketing Version: $VERSION"
            exit 1
          fi
          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Marketing Version: $VERSION"

      - name: Install App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          KEY_DIR="$RUNNER_TEMP/private_keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"
          printf '%s\n' "$APP_STORE_CONNECT_API_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Resolve Build Number
        id: build
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_PATH: ${{ env.ASC_KEY_PATH }}
          BUNDLE_ID: ${{ env.BUNDLE_ID }}
          INPUT_BUILD: ${{ inputs.build_number }}
        run: python3 ci/resolve_build_number.py

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME"

      - name: Archive (unsigned)
        run: |
          set -o pipefail

          ARCHIVE_PATH="$RUNNER_TEMP/Morph.xcarchive"
          LOG="$RUNNER_TEMP/archive.log"
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

          # 无签名归档：不触发 Automatic Signing 创建 Development 证书（避免证书配额耗尽）。
          # App Store 分发签名在 exportArchive 步骤通过 ASC API + Apple Distribution 完成。
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee "$LOG" || {
              echo "::error::Archive 失败，关键错误如下："
              grep -E "error:|fatal error:" "$LOG" | tail -40 || tail -80 "$LOG"
              exit 1
            }

          echo "Archive succeeded: $ARCHIVE_PATH"

      - name: Patch archive team metadata
        if: github.event_name == 'push' || inputs.upload_to_app_store
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ARCHIVE_PATH: ${{ env.ARCHIVE_PATH }}
        run: python3 ci/patch_archive_team.py

      - name: Generate Export Options
        if: github.event_name == 'push' || inputs.upload_to_app_store
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ env.BUNDLE_ID }}
        run: python3 ci/generate_export_options.py

      - name: Export IPA
        if: github.event_name == 'push' || inputs.upload_to_app_store
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail

          if [[ -z "$APPLE_TEAM_ID" ]]; then
            echo "::error::APPLE_TEAM_ID Secret 未配置"
            exit 1
          fi

          EXPORT_DIR="$RUNNER_TEMP/export"
          LOG="$RUNNER_TEMP/export.log"
          mkdir -p "$EXPORT_DIR"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ci/ExportOptions.generated.plist \
            -exportPath "$EXPORT_DIR" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee "$LOG" || {
              echo "::error::Export IPA 失败，关键错误如下："
              grep -E "error:|fatal error:" "$LOG" | tail -40 || tail -80 "$LOG"
              security find-identity -v -p codesigning || true
              exit 1
            }

          IPA_PATH=$(find "$EXPORT_DIR" -maxdepth 1 -name '*.ipa' | head -1)
          if [[ -z "$IPA_PATH" ]]; then
            echo "::error::未找到导出的 IPA"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "Exported: $IPA_PATH"

      - name: Re-sign nested frameworks
        if: github.event_name == 'push' || inputs.upload_to_app_store
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash ci/resign_ipa_nested_frameworks.sh "$IPA_PATH"

      - name: Verify IPA signatures
        if: github.event_name == 'push' || inputs.upload_to_app_store
        run: bash ci/verify_ipa_signatures.sh "$IPA_PATH"

      - name: Upload to App Store Connect
        if: github.event_name == 'push' || inputs.upload_to_app_store
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          cp "$ASC_KEY_PATH" ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait

      - name: Upload IPA artifact
        if: success() && env.IPA_PATH != ''
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Morph-${{ steps.version.outputs.marketing_version }}-${{ steps.build.outputs.build_number }}
          path: ${{ env.IPA_PATH }}
          if-no-files-found: ignore
          retention-days: 14
          compression-level: 6

      - name: Release summary
        if: always()
        run: |
          echo "### iOS Release" >> "$GITHUB_STEP_SUMMARY"
          echo "- Marketing Version: ${{ steps.version.outputs.marketing_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build Number: ${{ steps.build.outputs.build_number }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "${IPA_PATH:-}" ]]; then
            echo "- IPA: \`$IPA_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact 上传失败（ENOTFOUND）不影响 App Store Connect 上传，可在 ASC / TestFlight 查看构建。" >> "$GITHUB_STEP_SUMMARY"
